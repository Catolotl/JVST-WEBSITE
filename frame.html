<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRAME — Your Image Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0e0e;
    --paper: #f5f0e8;
    --cream: #ede7d9;
    --accent: #c8502a;
    --accent2: #3a5a8c;
    --muted: #8a8070;
    --border: #c8bfaf;
    --card-bg: #ffffff;
    --shadow: 0 2px 20px rgba(14,14,14,0.08);
    --shadow-hover: 0 8px 40px rgba(14,14,14,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
  }

  #auth-screen::after {
    content: 'FRAME';
    position: fixed;
    bottom: -4rem;
    right: -2rem;
    font-family: 'Playfair Display', serif;
    font-size: 18rem;
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  .auth-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 3rem;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
    box-shadow: 6px 6px 0 var(--cream), 6px 6px 0 1px var(--border);
  }

  .auth-brand {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 0.2rem;
    color: var(--ink);
  }

  .auth-brand span {
    color: var(--accent);
  }

  .auth-tagline {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 2px solid var(--border);
  }

  .auth-tab {
    padding: 0.6rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    position: relative;
    transition: color 0.2s;
  }

  .auth-tab.active {
    color: var(--ink);
  }

  .auth-tab.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    background: #fff;
  }

  .btn-primary {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.9rem 1.5rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover { background: var(--accent); }
  .btn-primary:active { transform: translateY(1px); }

  .auth-error {
    font-size: 0.75rem;
    color: var(--accent);
    min-height: 1rem;
    margin-top: -0.25rem;
  }

  /* ── APP SCREEN ── */
  #app-screen { display: none; min-height: 100vh; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(8px);
  }

  .topbar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .topbar-brand span { color: var(--accent); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .user-badge {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-ghost {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    background: none;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost:hover {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* UPLOAD ZONE */
  .upload-zone-wrapper {
    padding: 2.5rem 2.5rem 0;
  }

  .upload-zone {
    border: 2px dashed var(--border);
    padding: 2.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    background: var(--card-bg);
    text-align: center;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: #fff8f5;
  }

  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    width: 48px;
    height: 48px;
    color: var(--muted);
  }

  .upload-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-style: italic;
    color: var(--ink);
  }

  .upload-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .upload-progress {
    width: 100%;
    max-width: 300px;
    height: 3px;
    background: var(--cream);
    overflow: hidden;
    display: none;
  }

  .upload-progress-bar {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0%;
  }

  /* GALLERY */
  .gallery-header {
    padding: 2rem 2.5rem 1rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  .gallery-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 400;
    font-style: italic;
  }

  .gallery-count {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .gallery-grid {
    padding: 0 2.5rem 4rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.25rem;
  }

  .image-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s, transform 0.3s;
    animation: fadeInUp 0.4s ease both;
  }

  .image-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-3px);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .image-card-thumb {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    background: var(--cream);
  }

  .image-card-body {
    padding: 0.75rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .image-card-name {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .btn-download {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.4rem 0.7rem;
    border: 1px solid var(--border);
    background: none;
    color: var(--ink);
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    transition: all 0.18s;
  }

  .btn-download:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 500;
    background: rgba(14,14,14,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
  }

  .lightbox-img {
    max-width: 100%;
    max-height: 85vh;
    object-fit: contain;
    display: block;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .lightbox-close {
    position: absolute;
    top: -2rem;
    right: 0;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: #fff;
    background: none;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .lightbox-close:hover { opacity: 1; }

  .lightbox-dl {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--paper);
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 0.6rem 1.2rem;
    transition: background 0.2s, border-color 0.2s;
  }
  .lightbox-dl:hover { background: var(--accent); border-color: var(--accent); }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    padding: 5rem 2rem;
    text-align: center;
  }

  .empty-state-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .empty-state-sub {
    font-size: 0.75rem;
    color: var(--border);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 600;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    padding: 0.8rem 1.3rem;
    transform: translateY(2rem);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    max-width: 320px;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.error { background: var(--accent); }

  /* Loading spinner */
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state {
    grid-column: 1 / -1;
    padding: 4rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .topbar { padding: 1rem 1.25rem; }
    .upload-zone-wrapper, .gallery-header, .gallery-grid { padding-left: 1.25rem; padding-right: 1.25rem; }
    .auth-card { padding: 2rem; }
    #auth-screen::after { font-size: 8rem; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-brand">FR<span>A</span>ME</div>
    <div class="auth-tagline">Your personal image vault</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="login-form" class="auth-form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" />
      </div>
      <div class="auth-error" id="login-error"></div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>
    </div>

    <div id="signup-form" class="auth-form" style="display:none">
      <div class="field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="min 6 characters" />
      </div>
      <div class="auth-error" id="signup-error"></div>
      <button class="btn-primary" onclick="doSignup()">Create Account →</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-brand">FR<span>A</span>ME</div>
    <div class="topbar-right">
      <div class="user-badge" id="user-email-display"></div>
      <button class="btn-ghost" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>

  <div class="upload-zone-wrapper">
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
      <svg class="upload-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M4 16l4-4m0 0l4 4m-4-4v9M20 16v1a3 3 0 01-3 3H7a3 3 0 01-3-3v-1m16-3l-4-4m0 0l-4 4"/>
      </svg>
      <div class="upload-title">Drop images here</div>
      <div class="upload-sub">or click to browse · PNG, JPG, GIF, WebP</div>
      <div class="upload-progress" id="upload-progress">
        <div class="upload-progress-bar" id="upload-progress-bar"></div>
      </div>
    </div>
  </div>

  <div class="gallery-header">
    <div class="gallery-title">Your images</div>
    <div class="gallery-count" id="gallery-count"></div>
  </div>

  <div class="gallery-grid" id="gallery-grid">
    <div class="loading-state"><div class="spinner"></div> Loading your vault…</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-inner">
    <button class="lightbox-close" onclick="closeLightbox()">✕ Close</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <div style="text-align:center; margin-top:0.75rem;">
      <a class="lightbox-dl" id="lightbox-dl" href="#" download>
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Download
      </a>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL, listAll, deleteObject }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const JVST_FB = {
    apiKey: "AIzaSyC50_wBK3TfERX1gm35puugCD324SxHJR8",
    authDomain: "tunesandindy.firebaseapp.com",
    projectId: "tunesandindy",
    storageBucket: "tunesandindy.firebasestorage.app",
    messagingSenderId: "335192973371",
    appId: "1:335192973371:web:ce69d4b67c765d6aaf7c1e"
  };

  const app = initializeApp(JVST_FB);
  const auth = getAuth(app);
  const storage = getStorage(app);

  let currentUser = null;

  // ── AUTH STATE ──
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'block';
      document.getElementById('user-email-display').textContent = user.email;
      loadGallery();
    } else {
      currentUser = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app-screen').style.display = 'none';
    }
  });

  // ── AUTH ACTIONS ──
  window.doLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('login-error').textContent = friendlyError(e.code);
    }
  };

  window.doSignup = async () => {
    const email = document.getElementById('signup-email').value.trim();
    const pass  = document.getElementById('signup-password').value;
    document.getElementById('signup-error').textContent = '';
    try {
      await createUserWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('signup-error').textContent = friendlyError(e.code);
    }
  };

  window.doSignOut = async () => {
    await signOut(auth);
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?0:1)===i));
    document.getElementById('login-form').style.display  = tab === 'login'  ? 'flex' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
  };

  // ── UPLOAD ──
  window.handleFiles = (files) => {
    [...files].forEach(uploadFile);
  };

  function uploadFile(file) {
    if (!file.type.startsWith('image/')) { showToast('Only images, please.', true); return; }
    const path = `images/${currentUser.uid}/${Date.now()}_${file.name}`;
    const storageRef = ref(storage, path);
    const task = uploadBytesResumable(storageRef, file);

    const progressEl = document.getElementById('upload-progress');
    const barEl = document.getElementById('upload-progress-bar');
    progressEl.style.display = 'block';

    task.on('state_changed',
      snap => {
        barEl.style.width = (snap.bytesTransferred / snap.totalBytes * 100) + '%';
      },
      err => { showToast('Upload failed: ' + err.message, true); progressEl.style.display = 'none'; },
      async () => {
        barEl.style.width = '0%';
        progressEl.style.display = 'none';
        showToast('Image uploaded!');
        const url = await getDownloadURL(task.snapshot.ref);
        addCardToGallery({ url, name: file.name, ref: task.snapshot.ref });
      }
    );
  }

  // ── DRAG & DROP ──
  const dz = document.getElementById('drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  // ── GALLERY ──
  async function loadGallery() {
    const grid = document.getElementById('gallery-grid');
    grid.innerHTML = '<div class="loading-state"><div class="spinner"></div> Loading your vault…</div>';

    try {
      const folderRef = ref(storage, `images/${currentUser.uid}/`);
      const result = await listAll(folderRef);
      grid.innerHTML = '';

      if (result.items.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-title">Nothing here yet</div>
            <div class="empty-state-sub">Upload your first image above</div>
          </div>`;
        updateCount(0);
        return;
      }

      updateCount(result.items.length);
      let i = 0;
      for (const itemRef of result.items) {
        const url = await getDownloadURL(itemRef);
        addCardToGallery({ url, name: itemRef.name, ref: itemRef }, i * 60);
        i++;
      }
    } catch(e) {
      grid.innerHTML = '<div class="loading-state" style="color:var(--accent)">Could not load images.</div>';
    }
  }

  function addCardToGallery({ url, name, ref: fileRef }, delay = 0) {
    const grid = document.getElementById('gallery-grid');
    const empty = grid.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'image-card';
    card.style.animationDelay = delay + 'ms';

    const cleanName = name.replace(/^\d+_/, '');
    card.innerHTML = `
      <img class="image-card-thumb" src="${url}" alt="${cleanName}" loading="lazy"
        onclick="openLightbox('${url}', '${cleanName}')" style="cursor:pointer" />
      <div class="image-card-body">
        <div class="image-card-name" title="${cleanName}">${cleanName}</div>
        <a class="btn-download" href="${url}" download="${cleanName}" target="_blank">
          <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
          </svg>
          Save
        </a>
      </div>`;
    grid.appendChild(card);

    // Update count
    const count = grid.querySelectorAll('.image-card').length;
    updateCount(count);
  }

  function updateCount(n) {
    document.getElementById('gallery-count').textContent =
      n === 0 ? '' : `${n} image${n !== 1 ? 's' : ''}`;
  }

  // ── LIGHTBOX ──
  window.openLightbox = (url, name) => {
    document.getElementById('lightbox-img').src = url;
    document.getElementById('lightbox-dl').href = url;
    document.getElementById('lightbox-dl').download = name;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeLightbox = (e) => {
    if (e && e.target !== document.getElementById('lightbox') && !e.target.closest('.lightbox-close')) return;
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox({}); });

  // ── TOAST ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 3200);
  }
  window.showToast = showToast;

  function friendlyError(code) {
    const map = {
      'auth/invalid-email': 'Invalid email address.',
      'auth/user-not-found': 'No account with that email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/email-already-in-use': 'Email already registered.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/invalid-credential': 'Invalid email or password.',
    };
    return map[code] || 'Something went wrong. Try again.';
  }
</script>
</body>
</html>
